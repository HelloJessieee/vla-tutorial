# Minimal defaults — tuned for laptop / 8GB GPU
# task: reach (L0) | push (L1 push_block) — see configs/push.yaml
task: reach
data_dir: data/synthetic
output_dir: runs/default
num_episodes: 120
seed: 0
epochs: 3
batch_size: 4
lr: 0.001
eval_episodes: 50
eval_seed: 100
dry_run_episodes: 30
device: null  # auto: cuda if available else cpu
# MiniVLA 默认 backbone 为 clip（见 model/vla.py VLAConfig）
vlm_backbone: clip
# vlm_name: openai/clip-vit-base-patch32
